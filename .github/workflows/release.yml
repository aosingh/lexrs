name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run tests
    uses: ./.github/workflows/ci.yml

  build:
    name: ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p lexrs-server --target ${{ matrix.target }}
          else
            cargo build --release -p lexrs-server --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          SUFFIX=${{ matrix.suffix }}
          mkdir -p dist
          cp target/$TARGET/release/writer$SUFFIX dist/writer-$TARGET$SUFFIX
          cp target/$TARGET/release/reader$SUFFIX dist/reader-$TARGET$SUFFIX

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
