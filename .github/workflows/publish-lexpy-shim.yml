name: Publish lexpy shim

on:
  workflow_dispatch:
  push:
    tags:
      - 'lexpy-v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          cd lexpy-shim
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: lexpy-dist
          path: lexpy-shim/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lexpy-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
