events {}

http {
    upstream writer {
        server writer:3000;
    }

    upstream readers {
        server reader:3001;
    }

    server {
        listen 80;

        # Write routes → writer
        location ~ ^/(words|compact|snapshot) {
            proxy_pass http://writer;
            proxy_set_header Host $host;
        }

        # Read routes → reader pool (round-robin)
        location ~ ^/(search|prefix|contains|stats) {
            proxy_pass http://readers;
            proxy_set_header Host $host;
        }

        # Health
        location /health {
            proxy_pass http://readers;
        }
    }
}
